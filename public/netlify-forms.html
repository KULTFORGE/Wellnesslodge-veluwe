<!DOCTYPE html>
<html>
<body>
  <!-- Static form stub — Netlify scans this at build time to detect the form.
       The actual form is rendered by React in ContactSection.tsx. -->
  <form name="contact" netlify netlify-honeypot="bot-field" hidden>
    <input type="text" name="naam" />
    <input type="email" name="email" />
    <textarea name="bericht"></textarea>
  </form>
</body>
</html>
